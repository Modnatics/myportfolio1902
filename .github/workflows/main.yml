name: Deploy to EC2 Nginx
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. Define the deployment directory
            APP_DIR="/var/www/html"
            
            # 2. Update code in a temporary or separate directory first
            # (Assuming you already cloned the repo into ~/my-app)
            cd ~/my-app || git clone https://github.com/${{ github.repository }} ~/my-app
            cd ~/my-app
            git pull origin main
            
            # 3. Copy files to Nginx web root (requires sudo)
            sudo cp -r * $APP_DIR
            
            # 4. Set correct permissions for Nginx
            sudo chown -R www-data:www-data $APP_DIR
            
            # 5. Reload Nginx to apply any config changes
            sudo systemctl reload nginx
